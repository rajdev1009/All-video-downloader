# render.yaml — Render.com deployment configuration

services:
  - type: web
    name: telegram-video-bot
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      apt-get install -y ffmpeg
    startCommand: python bot.py
    envVars:
      - key: API_ID
        sync: false        # Set manually in Render dashboard
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: PORT
        value: 8080
